# ── Archivum Null — Production Docker Compose ──
# Hardened for homelab deployment behind Tailscale + SWAG
#
# SECURITY NOTES:
# - Container runs as non-root (UID 1001)
# - Read-only root filesystem (tmpfs for /tmp)
# - All Linux capabilities dropped
# - No new privileges
# - No docker.sock mount
# - Bind ONLY to Tailscale IP (set BIND_ADDRESS in .env)

services:
  archivum-null:
    build: .
    container_name: archivum-null
    restart: unless-stopped

    # Security hardening
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:noexec,nosuid,size=64m

    # Volumes
    volumes:
      - vault-data:/data/vaults

    # Network: expose only on Tailscale IP
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:${PORT:-3000}:3000"

    # Environment
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - BIND_ADDRESS=0.0.0.0

    # Resource limits
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M

    # Health check
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  vault-data:
    driver: local
