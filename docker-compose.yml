# ── Archivum Null — Production Docker Compose ──
# Hardened for homelab deployment behind a reverse proxy + private tunnel
#
# DEPLOYMENT MODES:
#   Pull from registry (CD):  docker compose pull && docker compose up -d
#   Build locally:            docker compose up -d --build
#
# SECURITY NOTES:
# - Container runs as non-root (UID 1001)
# - Read-only root filesystem (tmpfs for /tmp)
# - All Linux capabilities dropped
# - No new privileges
# - No docker.sock mount
# - Bind ONLY to the tunnel/private interface IP (set HOST_BIND_ADDRESS in .env)

services:
  archivum-null:
    # When IMAGE_TAG is set (e.g. 1.2.3), docker compose pull fetches that exact
    # version from ghcr.io. Defaults to 'main' (latest stable production release).
    # Do NOT set IMAGE_TAG to 'edge' or 'dev' in production — those are snapshots.
    # The build: block below is used when building locally with --build.
    image: ghcr.io/whiteravens20/archivum-null:${IMAGE_TAG:-main}
    build:
      context: .
      args:
        - VITE_MAX_FILE_SIZE=${VITE_MAX_FILE_SIZE:-104857600}
        - VITE_TURNSTILE_SITE_KEY=${VITE_TURNSTILE_SITE_KEY:-0x0000000000000000000000}
        - VITE_DEFAULT_TTL=${VITE_DEFAULT_TTL:-86400}
        - VITE_DEFAULT_MAX_DOWNLOADS=${VITE_DEFAULT_MAX_DOWNLOADS:-10}
    container_name: archivum-null
    restart: unless-stopped

    # Security hardening
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:noexec,nosuid,size=64m

    # Volumes
    volumes:
      - vault-data:/data/vaults
      - ./TOS.md:/app/TOS.md:ro

    # Network: expose only on the tunnel/private interface IP.
    # HOST_BIND_ADDRESS (from .env) controls which HOST interface Docker publishes
    # the port on — set it to your tunnel/WireGuard IP.
    # BIND_ADDRESS (set in environment: below) stays 0.0.0.0 so Fastify listens
    # on all interfaces inside the container's own network namespace; Docker's
    # port mapping is the actual enforcement boundary.
    ports:
      - "${HOST_BIND_ADDRESS:-127.0.0.1}:${PORT:-3000}:3000"

    # Environment
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      # Must stay 0.0.0.0 inside Docker — Fastify listens on all container
      # interfaces; host-side restriction is enforced by ports: above.
      - BIND_ADDRESS=0.0.0.0

    # Resource limits
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M

    # Health check
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    # Network: dedicated bridge — container is isolated from the default docker
    # network and any unrelated containers on the host.
    networks:
      - archivum

volumes:
  vault-data:
    driver: local

networks:
  archivum:
    driver: bridge
