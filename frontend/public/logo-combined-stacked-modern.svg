<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!--
    Archivum Null — Modern Combined Logo (Stacked variant)
    Symbol centred on top, title + tagline centred below
    Gradient: cyan → blue → violet
  -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@600&amp;display=swap');
  </style>

  <defs>
    <!-- Symbol gradient in 512×512 local space -->
    <linearGradient id="symGrad" x1="256" y1="80" x2="256" y2="460" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#22D3EE"/>
      <stop offset="55%"  stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>

    <radialGradient id="diamondFill" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#60A5FA" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#60A5FA" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#22D3EE" stop-opacity="0"/>
      <stop offset="80%"  stop-color="#22D3EE" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>

    <!-- Text gradient: horizontal across 400px canvas -->
    <linearGradient id="textGrad" x1="60" y1="0" x2="340" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#22D3EE"/>
      <stop offset="55%"  stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>

    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="eyeGlow" x="-150%" y="-150%" width="400%" height="400%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="textGlow" x="-5%" y="-40%" width="110%" height="180%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Faint halo behind symbol -->
  <circle cx="200" cy="105" r="100" fill="url(#halo)"/>

  <!--
    Symbol centred:
    Symbol 512×512, scale 0.25 → 128×128
    To centre at x=200: translate = 200 - 256*0.25 = 200 - 64 = 136
    Vertical: symbol top in local y≈108, so at scale 0.25 → y≈27
    translate(136, 18) puts symbol top at ~18+27=45, fills ~45–125
  -->
  <g transform="translate(136, 18) scale(0.25)">

    <path
      d="M 195.36 430.28
         A 200 200 0 1 1 316.64 430.28"
      stroke="url(#symGrad)"
      stroke-width="18"
      stroke-linecap="round"
      fill="none"
      filter="url(#glow)"
    />

    <g stroke="url(#symGrad)" fill="none" filter="url(#glow)">
      <path
        d="M 256 108 L 288 152 L 256 196 L 224 152 Z"
        stroke-width="10"
        stroke-linejoin="miter"
        fill="url(#diamondFill)"
      />
      <path
        d="M 256 196 L 256 380
           M 256 260 L 232 260 L 232 280 L 256 280
           M 256 260 L 280 260 L 280 280 L 256 280
           M 256 305 L 238 305 L 238 320 L 256 320
           M 256 305 L 274 305 L 274 320 L 256 320
           M 240 370 L 256 395 L 272 370"
        stroke-width="9"
        stroke-linejoin="miter"
        stroke-linecap="round"
      />
    </g>

    <circle cx="256" cy="152" r="8" fill="url(#symGrad)" filter="url(#eyeGlow)"/>
  </g>

  <!-- Thin separator line -->
  <line x1="80" y1="178" x2="320" y2="178"
        stroke="url(#symGrad)" stroke-width="0.8" opacity="0.35"/>

  <!-- Title — centred -->
  <text
    x="200" y="220"
    text-anchor="middle"
    font-family="'Inter', 'IBM Plex Sans', 'Sora', -apple-system, sans-serif"
    font-weight="600"
    font-size="40"
    letter-spacing="5"
    fill="url(#textGrad)"
    filter="url(#textGlow)"
  >ARCHIVUM NULL</text>

  <!-- Tagline — centred -->
  <text
    x="200" y="252"
    text-anchor="middle"
    font-family="'JetBrains Mono', 'SF Mono', 'Fira Code', monospace"
    font-weight="400"
    font-size="13"
    letter-spacing="3.5"
    fill="#475569"
  >ZERO TRUST FILE RELAY</text>
</svg>
