<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 100" fill="none">
  <!--
    Archivum Null — Modern Combined Logo (Badge variant)
    Dark rounded-rect card • symbol left • vertical divider • text right
    Compact 660×100 canvas
  -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@600&amp;display=swap');
  </style>

  <defs>
    <!-- Symbol gradient in 512×512 local space -->
    <linearGradient id="symGrad" x1="256" y1="80" x2="256" y2="460" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#22D3EE"/>
      <stop offset="55%"  stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>

    <radialGradient id="diamondFill" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#60A5FA" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#60A5FA" stop-opacity="0"/>
    </radialGradient>

    <!-- Text gradient: horizontal -->
    <linearGradient id="textGrad" x1="114" y1="0" x2="620" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#22D3EE"/>
      <stop offset="55%"  stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>

    <!-- Card border gradient -->
    <linearGradient id="borderGrad" x1="0" y1="0" x2="660" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#22D3EE" stop-opacity="0.45"/>
      <stop offset="50%"  stop-color="#60A5FA" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#A78BFA" stop-opacity="0.45"/>
    </linearGradient>

    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="eyeGlow" x="-150%" y="-150%" width="400%" height="400%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="textGlow" x="-5%" y="-50%" width="110%" height="200%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark card background -->
  <rect x="1" y="1" width="658" height="98" rx="16" fill="#0B0F19"/>

  <!-- Gradient border (stroke on a slightly smaller rect so it sits inside) -->
  <rect x="1" y="1" width="658" height="98" rx="16"
        stroke="url(#borderGrad)" stroke-width="1.5" fill="none"/>

  <!--
    Symbol:
    512×512, scale 0.175 → 89.6×89.6
    Centre at x=57: translate = 57 - 256*0.175 = 57 - 44.8 = 12.2
    Centre at y=50: translate = 50 - 269*0.175 = 50 - 47.1 = 2.9 ≈ 3
  -->
  <g transform="translate(6, 8) scale(0.175)">
    <path
      d="M 195.36 430.28
         A 200 200 0 1 1 316.64 430.28"
      stroke="url(#symGrad)"
      stroke-width="18"
      stroke-linecap="round"
      fill="none"
      filter="url(#glow)"
    />

    <g stroke="url(#symGrad)" fill="none" filter="url(#glow)">
      <path
        d="M 256 108 L 288 152 L 256 196 L 224 152 Z"
        stroke-width="10"
        stroke-linejoin="miter"
        fill="url(#diamondFill)"
      />
      <path
        d="M 256 196 L 256 380
           M 256 260 L 232 260 L 232 280 L 256 280
           M 256 260 L 280 260 L 280 280 L 256 280
           M 256 305 L 238 305 L 238 320 L 256 320
           M 256 305 L 274 305 L 274 320 L 256 320
           M 240 370 L 256 395 L 272 370"
        stroke-width="9"
        stroke-linejoin="miter"
        stroke-linecap="round"
      />
    </g>

    <circle cx="256" cy="152" r="8" fill="url(#symGrad)" filter="url(#eyeGlow)"/>
  </g>

  <!-- Vertical divider -->
  <line x1="100" y1="16" x2="100" y2="84"
        stroke="url(#symGrad)" stroke-width="1" opacity="0.4"/>

  <!-- Title -->
  <text
    x="114" y="52"
    font-family="'Inter', 'IBM Plex Sans', 'Sora', -apple-system, sans-serif"
    font-weight="600"
    font-size="36"
    letter-spacing="4.5"
    fill="url(#textGrad)"
    filter="url(#textGlow)"
  >ARCHIVUM NULL</text>

  <!-- Tagline -->
  <text
    x="114" y="74"
    font-family="'JetBrains Mono', 'SF Mono', 'Fira Code', monospace"
    font-weight="400"
    font-size="12"
    letter-spacing="3.5"
    fill="#475569"
  >ZERO TRUST FILE RELAY</text>
</svg>
