<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!--
    Archivum Null — Symbol on dark background
    Key-sigil design
  -->
  <rect width="512" height="512" rx="40" fill="#0B0F19"/>

  <!-- Broken circle -->
  <path
    d="M 195.36 430.28
       A 200 200 0 1 1 316.64 430.28"
    stroke="#60A5FA"
    stroke-width="18"
    stroke-linecap="round"
    fill="none"
  />

  <!-- Diamond head -->
  <path
    d="M 256 108 L 288 152 L 256 196 L 224 152 Z"
    stroke="#60A5FA" stroke-width="10" stroke-linejoin="miter" fill="none"
  />
  <circle cx="256" cy="152" r="8" fill="#60A5FA" />

  <!-- Shaft -->
  <line x1="256" y1="196" x2="256" y2="380"
        stroke="#60A5FA" stroke-width="10" />

  <!-- Key teeth L -->
  <path d="M 256 260 L 232 260 L 232 280 L 256 280"
        stroke="#60A5FA" stroke-width="8" stroke-linejoin="miter" fill="none" />
  <path d="M 256 305 L 238 305 L 238 320 L 256 320"
        stroke="#60A5FA" stroke-width="8" stroke-linejoin="miter" fill="none" />

  <!-- Key teeth R -->
  <path d="M 256 260 L 280 260 L 280 280 L 256 280"
        stroke="#60A5FA" stroke-width="8" stroke-linejoin="miter" fill="none" />
  <path d="M 256 305 L 274 305 L 274 320 L 256 320"
        stroke="#60A5FA" stroke-width="8" stroke-linejoin="miter" fill="none" />

  <!-- Pointed terminus -->
  <path d="M 240 370 L 256 395 L 272 370"
        stroke="#60A5FA" stroke-width="9" stroke-linejoin="miter" stroke-linecap="round" fill="none" />
</svg>
