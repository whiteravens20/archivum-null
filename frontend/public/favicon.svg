<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="none">
  <!--
    Archivum Null — Favicon (16x16 optimized)
    Broken circle + key-sigil (diamond, shaft, teeth, chevron)
  -->
  <rect width="16" height="16" rx="2.5" fill="#0B0F19"/>

  <!-- Broken circle -->
  <path
    d="M 5.2 12.8
       A 5.5 5.5 0 1 1 10.8 12.8"
    stroke="#60A5FA"
    stroke-width="1.4"
    stroke-linecap="round"
    fill="none"
  />

  <!-- Diamond head (sigil eye) -->
  <path
    d="M 8 3 L 9.5 4.8 L 8 6.6 L 6.5 4.8 Z"
    stroke="#60A5FA"
    stroke-width="0.9"
    stroke-linejoin="miter"
    fill="none"
  />
  <!-- Eye dot -->
  <circle cx="8" cy="4.8" r="0.7" fill="#60A5FA" />

  <!-- Shaft -->
  <line x1="8" y1="6.6" x2="8" y2="11.5"
        stroke="#60A5FA" stroke-width="1" />

  <!-- Key teeth (simplified for small size) -->
  <line x1="6.5" y1="8.2" x2="8" y2="8.2"
        stroke="#60A5FA" stroke-width="0.9" />
  <line x1="6.5" y1="8.2" x2="6.5" y2="9.2"
        stroke="#60A5FA" stroke-width="0.9" />
  <line x1="9.5" y1="8.2" x2="8" y2="8.2"
        stroke="#60A5FA" stroke-width="0.9" />
  <line x1="9.5" y1="8.2" x2="9.5" y2="9.2"
        stroke="#60A5FA" stroke-width="0.9" />

  <!-- Pointed terminus (chevron) -->
  <path d="M 7 11 L 8 12.2 L 9 11"
        stroke="#60A5FA" stroke-width="0.9" stroke-linejoin="miter" stroke-linecap="round" fill="none" />
</svg>
