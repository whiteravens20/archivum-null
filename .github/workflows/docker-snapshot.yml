# ── Archivum Null — Snapshot Builds ───────────────────────────────────────────
#
# Publishes a Docker image on every push to dev or main.
# These are NOT production releases — use a semver tag for that.
#
# Tags produced:
#   dev  branch push  →  ghcr.io/<owner>/<repo>:dev
#                        ghcr.io/<owner>/<repo>:dev-<7-char-sha>
#   main branch push  →  ghcr.io/<owner>/<repo>:edge
#                        ghcr.io/<owner>/<repo>:edge-<7-char-sha>
#
# ⚠️  Both :dev and :edge are snapshot builds and are NOT production releases.
#    The :main tag is reserved exclusively for versioned production releases
#    (see release.yml). For a stable production image use :main, :latest, or
#    a specific versioned tag (e.g. :1.2.3).
#
# The short-sha tag lets you pin a specific snapshot by commit if needed.
#
# VITE_ build-args fall back to safe defaults when repository variables are not
# set, so the workflow works out of the box on a fresh fork.
# ─────────────────────────────────────────────────────────────────────────────

name: Snapshot build

on:
  push:
    branches:
      - dev
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-push:
    name: Build & push ${{ github.ref_name }} snapshot
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # Required to push to ghcr.io

    outputs:
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Compute snapshot tag
        id: tag
        # dev   → prefix "dev",  main → prefix "edge"
        run: |
          if [[ "${{ github.ref_name }}" == "dev" ]]; then
            echo "prefix=dev" >> "$GITHUB_OUTPUT"
          else
            echo "prefix=edge" >> "$GITHUB_OUTPUT"
          fi
          echo "sha=$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.prefix }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.prefix }}-${{ steps.tag.outputs.sha }}
          # VITE_ vars are public build-time constants. Fallback defaults are used
          # when repository variables are not configured.
          build-args: |
            VITE_MAX_FILE_SIZE=${{ vars.VITE_MAX_FILE_SIZE || '104857600' }}
            VITE_TURNSTILE_SITE_KEY=${{ vars.VITE_TURNSTILE_SITE_KEY || '0x0000000000000000000000' }}
            VITE_DEFAULT_TTL=${{ vars.VITE_DEFAULT_TTL || '86400' }}
            VITE_DEFAULT_MAX_DOWNLOADS=${{ vars.VITE_DEFAULT_MAX_DOWNLOADS || '10' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Trivy scan (report-only — does not block snapshot builds) ────────────────
  # Findings are uploaded to the Security tab for visibility.
  # To gate merges to main on scan results, promote to exit-code: '1' and add
  # this job to your branch protection required checks.
  scan:
    name: Trivy scan (report-only)
    needs: build-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      security-events: write

    steps:
      - name: Checkout (for .trivyignore)
        uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Scan for CVEs
        uses: aquasecurity/trivy-action@0.34.2
        with:
          scan-type: image
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build-push.outputs.digest }}
          severity: HIGH,CRITICAL
          trivyignores: .trivyignore
          # exit-code: 0 — findings are reported but do NOT fail the build.
          # Snapshot images are for development iteration; blocking scans live
          # in release.yml where they gate production tags.
          exit-code: '0'
          format: sarif
          output: trivy-snapshot.sarif

      - name: Upload SARIF to Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-snapshot.sarif
          category: trivy-snapshot
