# ── Archivum Null — Release ───────────────────────────────────────────────────
#
# Triggered by a semver tag (v1.2.3) pushed from the main branch.
# Tags created on any other branch are silently ignored.
# Builds a hardened production Docker image, pushes it to GitHub Container
# Registry (ghcr.io), then scans the pushed image for HIGH/CRITICAL CVEs.
#
# ── Required repository configuration ────────────────────────────────────────
#
# REPOSITORY VARIABLES  (Settings → Secrets and variables → Variables)
# These are non-sensitive build-time constants baked into the frontend bundle.
# They are visible to everyone who downloads the image — they are NOT secrets.
#
#   VITE_MAX_FILE_SIZE         Max upload size in bytes (default: 104857600)
#   VITE_TURNSTILE_SITE_KEY    Cloudflare Turnstile public site key
#   VITE_DEFAULT_TTL           Default vault TTL in seconds (default: 86400)
#   VITE_DEFAULT_MAX_DOWNLOADS Default max downloads per vault (default: 10)
#
# ── Image ─────────────────────────────────────────────────────────────────────
# Published to: ghcr.io/<owner>/<repo>
# Example tags produced by v1.2.3:
#   ghcr.io/whiteravens20/archivum-null:1.2.3
#   ghcr.io/whiteravens20/archivum-null:1.2
#   ghcr.io/whiteravens20/archivum-null:1
#   ghcr.io/whiteravens20/archivum-null:main
#
# ℹ️  :main is ONLY updated by this workflow on a versioned semver release.
#    It always points to the most recent stable production build.
#    The :latest tag is intentionally NOT published — it is ambiguous by Docker
#    convention (simply the last image built, not necessarily stable).
#    For a pre-release snapshot of the main branch, use :edge (docker-snapshot.yml).
# ─────────────────────────────────────────────────────────────────────────────

name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Job 0: guard — ensure tag points to a commit on main ────────────────────
  # github.event.base_ref is unreliable for tags pushed via `git push origin <tag>`
  # (it is only populated reliably when the tag is created through the GitHub UI).
  # This job checks out the repo and uses `git branch --contains` to confirm the
  # tagged commit is actually reachable from main before the build runs.
  check-branch:
    name: Verify tag is on main
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      on-main: ${{ steps.check.outputs.on-main }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0   # full history needed for branch containment check
      - name: Check branch containment
        id: check
        run: |
          if git branch -r --contains "${{ github.sha }}" | grep -q 'origin/main'; then
            echo "on-main=true" >> "$GITHUB_OUTPUT"
          else
            echo "on-main=false" >> "$GITHUB_OUTPUT"
            echo "::error::Tag ${{ github.ref_name }} does not point to a commit on main. Release skipped."
          fi

  # ── Job 1: build and push image ─────────────────────────────────────────────
  build-push:
    name: Build & push Docker image
    needs: check-branch
    if: needs.check-branch.outputs.on-main == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # Required to push to ghcr.io

    outputs:
      digest: ${{ steps.build.outputs.digest }}
      tags:   ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Compute Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Produce 4 tags from a vX.Y.Z push:
          #   :X.Y.Z  (exact version)
          #   :X.Y    (minor)
          #   :X      (major)
          #   :main   (stable production — always the most recent versioned release)
          # NOTE: :latest is intentionally omitted — it is ambiguous by Docker
          # convention and could mislead users into pulling a snapshot.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=main
          # Propagate VCS labels for traceability
          labels: |
            org.opencontainers.image.title=Archivum Null
            org.opencontainers.image.description=Zero trust encrypted file relay
            org.opencontainers.image.url=https://github.com/${{ github.repository }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          # GITHUB_TOKEN is automatically provided — no secret configuration needed
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # VITE_ vars are PUBLIC build-time constants embedded in the JS bundle.
          # Store them as Repository Variables (not Secrets) — they are NOT sensitive.
          # Fallback defaults are used when variables are not set.
          build-args: |
            VITE_MAX_FILE_SIZE=${{ vars.VITE_MAX_FILE_SIZE || '104857600' }}
            VITE_TURNSTILE_SITE_KEY=${{ vars.VITE_TURNSTILE_SITE_KEY || '0x0000000000000000000000' }}
            VITE_DEFAULT_TTL=${{ vars.VITE_DEFAULT_TTL || '86400' }}
            VITE_DEFAULT_MAX_DOWNLOADS=${{ vars.VITE_DEFAULT_MAX_DOWNLOADS || '10' }}
          # GitHub Actions cache — dramatically speeds up repeated builds
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Generate SBOM and provenance attestations for supply-chain transparency
          provenance: true
          sbom: true

  # ── Job 2: GitHub Release with auto-generated changelog ─────────────────────
  # Creates (or updates) the GitHub Release for this tag.
  # GitHub's built-in release notes generator groups merged PRs by label,
  # lists direct commits, and credits every contributor automatically.
  # Configure grouping labels in .github/release.yml (distinct from this file).
  github-release:
    name: Create GitHub Release
    needs: [check-branch, build-push]
    if: needs.check-branch.outputs.on-main == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Required to create/update the release
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # needed to compare tag with previous tag

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Auto-generate body from GitHub's release notes API:
          # groups PRs by label, lists commits, credits contributors.
          generate_release_notes: true
          # Append Docker image reference to the generated notes.
          append_body: true
          body: |

            ---
            ## Docker image

            ```
            docker pull ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ```

            | Tag | Description |
            |---|---|
            | `${{ github.ref_name }}` | This exact release (immutable) |
            | `:main` | Always the latest stable production release |

            > **Digest (immutable):** `${{ needs.build-push.outputs.digest }}`

  # ── Job 3: Trivy scan on pushed image ────────────────────────────────────────
  # Pulls the freshly pushed image by immutable digest and scans for HIGH/CRITICAL
  # CVEs. exit-code: 1 fails the workflow on any unacknowledged finding.
  # Add CVE IDs to .trivyignore (with justification) to acknowledge and unblock.
  # Results are also uploaded to GitHub Security tab as SARIF regardless of outcome.
  scan:
    name: Trivy image scan
    needs: build-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read          # Pull image from ghcr.io
      security-events: write  # Upload SARIF to Security tab

    steps:
      - name: Checkout (for .trivyignore)
        uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Scan for HIGH/CRITICAL CVEs
        uses: aquasecurity/trivy-action@0.34.2
        with:
          scan-type: image
          # Use the immutable digest — never a mutable tag — for reproducibility
          image-ref: ghcr.io/${{ github.repository }}@${{ needs.build-push.outputs.digest }}
          severity: HIGH,CRITICAL
          trivyignores: .trivyignore
          exit-code: '1'
          format: sarif
          output: trivy-release.sarif

      - name: Upload SARIF to Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-release.sarif
          category: trivy-release

