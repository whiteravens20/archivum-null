name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly on Monday at 09:00 UTC
    - cron: '0 9 * * 1'

jobs:
  audit:
    name: npm audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Audit backend
        working-directory: backend
        run: npm audit --audit-level=high

      - name: Audit frontend
        working-directory: frontend
        run: npm audit --audit-level=high

  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    # Only runs on pull requests — compares new deps against known vulnerabilities
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  trivy-fs:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy on repository
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          format: sarif
          output: trivy-fs.sarif
          exit-code: '0'  # Report only — do not fail the build yet (beta)

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

  trivy-docker:
    name: Trivy Docker image scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t archivum-null:ci .

      - name: Run Trivy on Docker image
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: archivum-null:ci
          severity: HIGH,CRITICAL
          format: sarif
          output: trivy-docker.sarif
          exit-code: '0'  # Report only — do not fail the build yet (beta)

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-docker.sarif
          category: trivy-docker
