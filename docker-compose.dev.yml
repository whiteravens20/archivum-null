# ── Archivum Null — Development Docker Compose ──
# Less strict security for local development
# Hot reload, verbose logs, LAN accessible

services:
  archivum-backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: archivum-dev-backend
    restart: unless-stopped
    ports:
      - "0.0.0.0:3000:3000"
    volumes:
      - ./backend/src:/app/backend/src
      - ./TOS.md:/app/TOS.md:ro
      - vault-data-dev:/data/vaults
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - BIND_ADDRESS=0.0.0.0
      - PORT=3000
    command: npx tsx watch src/index.ts
    working_dir: /app/backend

  archivum-frontend:
    image: node:24-alpine
    container_name: archivum-dev-frontend
    restart: unless-stopped
    ports:
      - "0.0.0.0:5173:5173"
    volumes:
      - ./frontend:/app/frontend
      - frontend-node-modules:/app/frontend/node_modules
    working_dir: /app/frontend
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      - NODE_ENV=development
      - VITE_API_TARGET=http://archivum-backend:3000
      - VITE_MAX_FILE_SIZE=${VITE_MAX_FILE_SIZE:-104857600}
      - VITE_TURNSTILE_SITE_KEY=${VITE_TURNSTILE_SITE_KEY:-0x0000000000000000000000}
      - VITE_DEFAULT_TTL=${VITE_DEFAULT_TTL:-86400}
      - VITE_DEFAULT_MAX_DOWNLOADS=${VITE_DEFAULT_MAX_DOWNLOADS:-10}

volumes:
  vault-data-dev:
    driver: local
  frontend-node-modules:
    driver: local
